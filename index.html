<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Préstamos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --bg:#f8f8f6;--surface:#ffffff;--border:#e0dfd8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a96;
  --radius:10px;--radius-sm:6px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a18;--surface:#242422;--border:#333331;--text:#f0f0ec;--text2:#a0a09c;--text3:#6b6b67}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:520px;margin:0 auto;padding:0 0 80px}
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:19px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}
.fecha-badge{font-size:11px;color:var(--text2);background:var(--surface);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.sync-btn{font-size:12px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer}
.sync-btn.ok{color:var(--green)}.sync-btn.error{color:var(--red)}.sync-btn.syncing{color:var(--amber)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;min-width:60px;padding:12px 6px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;text-align:center}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.section{display:none;padding:16px}.section.active{display:block}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.metric{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.metric .label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.metric .value{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.metric .sub{font-size:11px;color:var(--text3);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--green)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-name{font-size:15px;font-weight:600;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge.green{background:var(--green-light);color:var(--green-dark)}
.badge.amber{background:var(--amber-light);color:var(--amber)}
.badge.red{background:var(--red-light);color:var(--red)}
.badge.blue{background:var(--blue-light);color:var(--blue)}
.badge.gray{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.badge.purple{background:var(--purple-light);color:var(--purple)}
.progress-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:3px;background:var(--green)}
.progress-fill.red{background:var(--red)}.progress-fill.amber{background:var(--amber)}
.card-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-top:6px}
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green-dark)}
.btn.primary:hover{background:var(--green-dark)}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red-light)}
.btn.purple{background:var(--purple);color:#fff;border-color:#3C3489}
.btn.purple:hover{background:#3C3489}
.btn.whatsapp{background:#25D366;color:#fff;border-color:#128C7E}
.btn.whatsapp:hover{background:#128C7E}
.btn.excel{background:#217346;color:#fff;border-color:#1a5c38}
.btn.excel:hover{background:#1a5c38}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.cobro-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cobro-item:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green-dark);flex-shrink:0}
.avatar.red{background:var(--red-light);color:var(--red)}
.cobro-info{flex:1;min-width:0}
.cobro-name{font-size:14px;font-weight:600;color:var(--text)}
.cobro-detail{font-size:11px;color:var(--text2);margin-top:1px}
.mora-tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:var(--red-light);color:var(--red);font-weight:600;margin-left:4px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.empty{text-align:center;color:var(--text2);font-size:13px;padding:36px 0}
.alerta-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:flex-start}
.alerta-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alerta-dot.red{background:var(--red)}.alerta-dot.amber{background:var(--amber)}
.search-bar{width:100%;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
.search-bar:focus{border-color:var(--green)}
.filtro-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filtro-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer}
.filtro-btn.active{background:var(--green);color:#fff;border-color:var(--green-dark)}
.hist-item{padding:10px 0;border-bottom:1px solid var(--border)}
.hist-top{display:flex;justify-content:space-between;font-size:14px;font-weight:600}
.hist-sub{font-size:12px;color:var(--text2);margin-top:3px}
.cuota-row{display:grid;grid-template-columns:26px 1fr auto auto;align-items:start;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border)}
.cuota-row:last-child{border-bottom:none}
.cuota-num{font-size:12px;color:var(--text3);padding-top:2px}
.cuota-info{font-size:13px;color:var(--text)}
.cuota-info small{font-size:11px;color:var(--red);display:block;margin-top:2px}
.cuota-monto{font-size:13px;font-weight:600;text-align:right;padding-top:2px}
.cuota-accion{min-width:72px;text-align:right}
.resumen-box{background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-top:14px}
.resumen-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.resumen-row:last-child{border-bottom:none;font-weight:700;font-size:14px}
.comprobante-box{background:var(--bg);border-radius:var(--radius);padding:14px;font-family:'Courier New',monospace;white-space:pre-wrap;font-size:12px;color:var(--text);border:1px solid var(--border);line-height:1.7;margin-top:10px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
@media(min-width:480px){.modal-overlay{align-items:center}}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
@media(min-width:480px){.modal{border-radius:var(--radius)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-size:17px;font-weight:700;color:var(--text)}
.modal-tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:var(--radius-sm);margin-bottom:14px}
.modal-tab{flex:1;padding:7px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:4px;cursor:pointer}
.modal-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.config-card h3{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.config-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.config-row label{font-size:14px;color:var(--text);flex:1}
.config-row input[type=number]{width:90px;text-align:right;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)}
.config-row input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--green)}
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
/* CAJA */
.caja-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.caja-metric{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.caja-metric.purple{border-color:var(--purple);background:var(--purple-light)}
.caja-metric.green{border-color:var(--green);background:var(--green-light)}
.caja-metric.red{border-color:var(--red);background:var(--red-light)}
.caja-metric .label{font-size:11px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.caja-metric.purple .label{color:var(--purple)}
.caja-metric.green .label{color:var(--green-dark)}
.caja-metric.red .label{color:var(--red)}
.caja-metric .value{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.caja-metric.purple .value{color:var(--purple)}
.caja-metric.green .value{color:var(--green-dark)}
.caja-metric.red .value{color:var(--red)}
.caja-metric .sub{font-size:11px;margin-top:3px;color:var(--text2)}
.movimiento-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.movimiento-item:last-child{border-bottom:none}
.mov-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mov-icon.ingreso{background:var(--green-light)}
.mov-icon.egreso{background:var(--red-light)}
.mov-info{flex:1}
.mov-desc{font-size:14px;font-weight:500;color:var(--text)}
.mov-fecha{font-size:11px;color:var(--text2);margin-top:1px}
.mov-monto{font-size:15px;font-weight:700}
.mov-monto.ingreso{color:var(--green)}
.mov-monto.egreso{color:var(--red)}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>💰 Mis Préstamos</h1>
  <div class="topbar-right">
    <span class="fecha-badge" id="fecha-hoy"></span>
    <button class="sync-btn" id="sync-btn" onclick="syncGSheets()">☁ Sync</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('inicio')">Inicio</button>
  <button class="tab" onclick="showTab('clientes')">Clientes</button>
  <button class="tab" onclick="showTab('cobros')">Cobros</button>
  <button class="tab" onclick="showTab('caja')">💼 Caja</button>
  <button class="tab" onclick="showTab('nuevo')">+ Nuevo</button>
  <button class="tab" onclick="showTab('config')">Config</button>
</div>

<!-- INICIO -->
<div id="sec-inicio" class="section active">
  <div class="metrics" id="metrics-container"></div>
  <div class="section-title"><span>Cobros pendientes</span><span id="total-hoy-label" style="font-size:12px;font-weight:500;color:var(--text2)"></span></div>
  <div id="cobros-hoy-list"></div>
  <div class="divider"></div>
  <div class="section-title">Alertas</div>
  <div id="alertas-list"></div>
</div>

<!-- CLIENTES -->
<div id="sec-clientes" class="section">
  <div class="export-bar">
    <button class="btn sm excel" onclick="exportarExcel()">⬇ Exportar Excel</button>
  </div>
  <input class="search-bar" id="search-clientes" placeholder="🔍 Buscar nombre, DNI o teléfono..." oninput="renderClientes()">
  <div class="filtro-bar">
    <button class="filtro-btn active" onclick="filtroCliente('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="filtroCliente('activo',this)">Activos</button>
    <button class="filtro-btn" onclick="filtroCliente('atrasado',this)">Atrasados</button>
    <button class="filtro-btn" onclick="filtroCliente('pagado',this)">Pagados</button>
  </div>
  <div id="lista-clientes"></div>
</div>

<!-- COBROS -->
<div id="sec-cobros" class="section">
  <div class="export-bar">
    <button class="btn sm excel" onclick="exportarExcelCobros()">⬇ Exportar cobros</button>
  </div>
  <div class="section-title"><span>Historial de cobros</span><span id="total-cobrado" style="font-size:12px;font-weight:600;color:var(--green)"></span></div>
  <div class="filtro-bar">
    <button class="filtro-btn active" onclick="filtroCobro('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="filtroCobro('hoy',this)">Hoy</button>
    <button class="filtro-btn" onclick="filtroCobro('semana',this)">Esta semana</button>
    <button class="filtro-btn" onclick="filtroCobro('mes',this)">Este mes</button>
  </div>
  <div id="lista-historial"></div>
</div>

<!-- CAJA -->
<div id="sec-caja" class="section">
  <div class="caja-metrics" id="caja-metrics"></div>
  <div class="section-title">
    <span>Movimientos</span>
    <button class="btn sm purple" onclick="abrirModalMovimiento()">+ Registrar</button>
  </div>
  <div class="filtro-bar">
    <button class="filtro-btn active" onclick="filtroMov('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="filtroMov('ingreso',this)">Ingresos</button>
    <button class="filtro-btn" onclick="filtroMov('egreso',this)">Egresos</button>
  </div>
  <div id="lista-movimientos"></div>
</div>

<!-- NUEVO -->
<div id="sec-nuevo" class="section">
  <div class="config-card">
    <h3>Datos del cliente</h3>
    <div class="form-group"><label>Nombre completo *</label><input id="n-nombre" type="text" placeholder="Ej: Juan Pérez"></div>
    <div class="form-row">
      <div class="form-group"><label>Teléfono / WhatsApp</label><input id="n-tel" type="tel" placeholder="3794123456"></div>
      <div class="form-group"><label>DNI</label><input id="n-dni" type="text" placeholder="30123456"></div>
    </div>
    <div class="form-group"><label>Dirección</label><input id="n-dir" type="text" placeholder="Ej: San Martín 123"></div>
  </div>
  <div class="config-card">
    <h3>Condiciones del préstamo</h3>
    <div class="form-row">
      <div class="form-group"><label>Monto prestado ($) *</label><input id="n-monto" type="number" placeholder="50000" oninput="calcularPrevia()"></div>
      <div class="form-group"><label>Interés total (%)</label><input id="n-interes" type="number" value="30" oninput="calcularPrevia()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cantidad de cuotas *</label><input id="n-cuotas" type="number" value="10" oninput="calcularPrevia()"></div>
      <div class="form-group"><label>Frecuencia</label>
        <select id="n-frecuencia" onchange="calcularPrevia()">
          <option value="diario">Diario</option>
          <option value="semanal" selected>Semanal</option>
          <option value="quincenal">Quincenal</option>
          <option value="mensual">Mensual</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Fecha de inicio *</label><input id="n-fecha" type="date" oninput="calcularPrevia()"></div>
      <div class="form-group"><label>Garantía / Aval</label><input id="n-garantia" type="text" placeholder="Ej: TV, moto..."></div>
    </div>
    <div class="form-group"><label>Notas</label><textarea id="n-notas" placeholder="Observaciones adicionales..."></textarea></div>
  </div>
  <div id="previa-prestamo" style="display:none">
    <div class="section-title"><span>Vista previa</span></div>
    <div class="resumen-box" id="previa-content"></div>
  </div>
  <div style="display:flex;gap:10px;margin-top:16px">
    <button class="btn" onclick="limpiarForm()" style="flex:1">Limpiar</button>
    <button class="btn primary" onclick="guardarPrestamo()" style="flex:2">✓ Guardar préstamo</button>
  </div>
</div>

<!-- CONFIG -->
<div id="sec-config" class="section">
  <div class="config-card">
    <h3>Google Sheets (respaldo automático)</h3>
    <div id="gsheets-status" style="font-size:13px;color:var(--text2);margin-bottom:12px">Estado: No configurado</div>
    <div class="form-group"><label>ID de tu Google Sheet</label><input id="cfg-sheet-id" type="text" placeholder="16VUDdrVkAw..."></div>
    <div class="form-group"><label>API Key de Google</label><input id="cfg-api-key" type="text" placeholder="AIzaSy..."></div>
    <button class="btn sm" onclick="probarConexion()">Probar conexión</button>
  </div>
  <div class="config-card">
    <h3>Tus datos</h3>
    <div class="form-group"><label>Tu nombre / negocio</label><input id="cfg-nombre" type="text" placeholder="Ej: PesoYa"></div>
    <div class="form-row">
      <div class="form-group"><label>Tu teléfono</label><input id="cfg-tel" type="tel" placeholder="3794000000"></div>
      <div class="form-group"><label>Ciudad</label><input id="cfg-ciudad" type="text" placeholder="Corrientes"></div>
    </div>
  </div>
  <div class="config-card">
    <h3>Mora por atraso</h3>
    <div class="config-row">
      <label>Activar mora automática</label>
      <input type="checkbox" id="cfg-mora-activa" onchange="saveConfig()">
    </div>
    <div class="config-row">
      <label>Mora diaria (%)</label>
      <input id="cfg-mora-pct" type="number" value="2" min="0" max="100" step="0.5">
    </div>
    <div class="config-row">
      <label>Días de gracia</label>
      <input id="cfg-mora-gracia" type="number" value="1" min="0" max="30">
    </div>
  </div>
  <div class="config-card">
    <h3>Comprobantes</h3>
    <div class="form-group"><label>Mensaje al pie</label><textarea id="cfg-msg" placeholder="Ej: Gracias por su pago. Consultas al 3794000000"></textarea></div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn primary" onclick="saveConfig();toast('Configuración guardada ✓')">Guardar configuración</button>
    <button class="btn excel" onclick="exportarExcel()">⬇ Exportar Excel</button>
    <button class="btn danger sm" onclick="resetearDatos()">Borrar todos los datos</button>
  </div>
</div>
</div>

<!-- Modal cliente -->
<div class="modal-overlay" id="modal-cliente">
<div class="modal">
  <div class="modal-header">
    <h2 id="modal-nombre">Cliente</h2>
    <button class="btn sm" onclick="cerrarModal()">✕</button>
  </div>
  <div class="modal-tabs">
    <button class="modal-tab active" onclick="modalTab('detalle',this)">Detalle</button>
    <button class="modal-tab" onclick="modalTab('cuotas',this)">Cuotas</button>
  </div>
  <div id="modal-content"></div>
</div>
</div>

<!-- Modal comprobante -->
<div class="modal-overlay" id="modal-comprobante">
<div class="modal">
  <div class="modal-header">

<script>
// ========== FECHA SIN BUG DE ZONA HORARIA ==========
// Usamos fecha local siempre, nunca UTC
function fechaHoy(){
  const d=new Date();
  return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}
const HOY=fechaHoy();

function parseFecha(str){
  // str viene como "2025-04-15" del input date
  if(!str)return null;
  const [y,m,d]=str.split('-').map(Number);
  return new Date(y,m-1,d);
}

function normalizarFecha(d){
  if(!d)return null;
  const dd=new Date(d);
  return new Date(dd.getFullYear(),dd.getMonth(),dd.getDate());
}

function fmtDate(d){
  if(!d)return'';
  const dd=normalizarFecha(d);
  return dd.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function fmtMoney(n){return'$'+Math.round(n).toLocaleString('es-AR')}
function addDias(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function getInitials(n){return(n||'').split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase()}
function diasFrec(f){return{diario:1,semanal:7,quincenal:15,mensual:30}[f]||7}

function diasAtraso(fecha){
  const f=normalizarFecha(fecha);
  if(!f)return 0;
  const diff=Math.floor((HOY-f)/(86400000));
  return Math.max(0,diff);
}

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

let cfg=JSON.parse(localStorage.getItem('gtg_cfg')||'{}');
let prestamos=JSON.parse(localStorage.getItem('gtg_prestamos')||'[]');
let pagos=JSON.parse(localStorage.getItem('gtg_pagos')||'[]');
let movimientos=JSON.parse(localStorage.getItem('gtg_movimientos')||'[]');
let filtroClienteActual='todos';
let filtroCobroActual='todos';
let filtroMovActual='todos';
let modalTabActual='detalle';
let clienteActualId=null;
let comprobanteData=null;

// Normalizar fechas al cargar
prestamos.forEach(p=>{
  p.fechaInicio=normalizarFecha(p.fechaInicio);
  p.cuotas.forEach(c=>{
    c.fecha=normalizarFecha(c.fecha);
    if(c.fechaPago)c.fechaPago=normalizarFecha(c.fechaPago);
  });
});
movimientos.forEach(m=>{m.fecha=normalizarFecha(m.fecha)});

function saveAll(){
  localStorage.setItem('gtg_prestamos',JSON.stringify(prestamos));
  localStorage.setItem('gtg_pagos',JSON.stringify(pagos));
  localStorage.setItem('gtg_movimientos',JSON.stringify(movimientos));
  autoSyncGSheets();
}

function saveConfig(){
  cfg={
    nombre:document.getElementById('cfg-nombre').value,
    tel:document.getElementById('cfg-tel').value,
    ciudad:document.getElementById('cfg-ciudad').value,
    moraActiva:document.getElementById('cfg-mora-activa').checked,
    moraPct:parseFloat(document.getElementById('cfg-mora-pct').value)||2,
    moraGracia:parseInt(document.getElementById('cfg-mora-gracia').value)||1,
    mensaje:document.getElementById('cfg-msg').value,
    sheetId:document.getElementById('cfg-sheet-id').value.trim(),
    apiKey:document.getElementById('cfg-api-key').value.trim()
  };
  localStorage.setItem('gtg_cfg',JSON.stringify(cfg));
}

function loadConfig(){
  document.getElementById('cfg-nombre').value=cfg.nombre||'';
  document.getElementById('cfg-tel').value=cfg.tel||'';
  document.getElementById('cfg-ciudad').value=cfg.ciudad||'';
  document.getElementById('cfg-mora-activa').checked=cfg.moraActiva||false;
  document.getElementById('cfg-mora-pct').value=cfg.moraPct||2;
  document.getElementById('cfg-mora-gracia').value=cfg.moraGracia||1;
  document.getElementById('cfg-msg').value=cfg.mensaje||'';
  document.getElementById('cfg-sheet-id').value=cfg.sheetId||'';
  document.getElementById('cfg-api-key').value=cfg.apiKey||'';
}

function calcMora(c){
  if(!cfg.moraActiva||c.pagada)return 0;
  const f=normalizarFecha(c.fecha);
  if(!f||f>=HOY)return 0;
  const d=diasAtraso(f);
  const ef=Math.max(0,d-(cfg.moraGracia||1));
  return ef>0?c.monto*(cfg.moraPct/100)*ef:0;
}

function estadoPrestamo(p){
  const at=p.cuotas.filter(c=>{
    const f=normalizarFecha(c.fecha);
    return!c.pagada&&f&&f<HOY;
  }).length;
  const pg=p.cuotas.filter(c=>c.pagada).length;
  if(pg===p.cuotas.length)return'pagado';
  if(at>0)return'atrasado';
  return'activo';
}

function progreso(p){return(p.cuotas.filter(c=>c.pagada).length/p.cuotas.length*100).toFixed(0)}

function generarCuotas(p){
  const cuotas=[];
  const total=p.monto*(1+p.interes/100);
  const val=total/p.cuotasTotal;
  const dias=diasFrec(p.frecuencia);
  // Usamos fechaInicio ya normalizada
  let f=new Date(p.fechaInicio);
  for(let i=0;i<p.cuotasTotal;i++){
    cuotas.push({num:i+1,fecha:new Date(f.getFullYear(),f.getMonth(),f.getDate()),monto:val,pagada:false,fechaPago:null,moraAplicada:0});
    f=addDias(f,dias);
  }
  return cuotas;
}

// ========== GOOGLE SHEETS ==========
let lastSync=null;
async function syncGSheets(){
  if(!cfg.sheetId||!cfg.apiKey){toast('Configurá Google Sheets en Config');return}
  const btn=document.getElementById('sync-btn');
  btn.textContent='☁ ...';btn.className='sync-btn syncing';
  try{
    await pushToSheets();
    lastSync=new Date();
    btn.textContent='☁ ✓';btn.className='sync-btn ok';
    toast('Sincronizado con Google Sheets ✓');
    setTimeout(()=>{btn.textContent='☁ Sync';btn.className='sync-btn'},3000);
  }catch(e){
    btn.textContent='☁ Error';btn.className='sync-btn error';
    toast('Error al sincronizar. Verificá Config.');
    setTimeout(()=>{btn.textContent='☁ Sync';btn.className='sync-btn'},3000);
  }
}

async function pushToSheets(){
  if(!cfg.sheetId||!cfg.apiKey)return;
  const rows=[['Nombre','Tel','DNI','Dirección','Capital','Interés%','Cuotas','Frecuencia','Fecha Inicio','Estado','Cuotas Pagadas','Pendiente','Mora','Garantía','Notas']];
  prestamos.forEach(p=>{
    const est=estadoPrestamo(p);
    const mora=p.cuotas.reduce((a,c)=>a+calcMora(c),0);
    const pend=p.cuotas.filter(c=>!c.pagada).reduce((a,c)=>a+c.monto+calcMora(c),0);
    rows.push([p.nombre,p.tel||'',p.dni||'',p.dir||'',p.monto,p.interes,p.cuotasTotal,p.frecuencia,fmtDate(p.fechaInicio),est,p.cuotas.filter(c=>c.pagada).length,Math.round(pend),Math.round(mora),p.garantia||'',p.notas||'']);
  });
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/Prestamos!A1?valueInputOption=RAW&key=${cfg.apiKey}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:rows})});
  const rowsP=[['Cliente','Cuota','Total cuotas','Monto','Mora','Total cobrado','Fecha']];
  pagos.forEach(pg=>rowsP.push([pg.cliente,pg.numCuota,pg.totalCuotas||'',Math.round(pg.montoCuota||pg.monto),Math.round(pg.mora||0),Math.round(pg.monto),fmtDate(pg.fecha)]));
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/Cobros!A1?valueInputOption=RAW&key=${cfg.apiKey}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:rowsP})});
  const rowsM=[['Fecha','Tipo','Categoría','Descripción','Monto']];
  movimientos.forEach(m=>rowsM.push([fmtDate(m.fecha),m.tipo,m.categoria,m.desc,Math.round(m.monto)]));
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/Caja!A1?valueInputOption=RAW&key=${cfg.apiKey}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:rowsM})});
}

function autoSyncGSheets(){if(cfg.sheetId&&cfg.apiKey)pushToSheets().catch(()=>{})}

async function probarConexion(){
  saveConfig();
  if(!cfg.sheetId||!cfg.apiKey){toast('Ingresá el ID y la API Key');return}
  toast('Probando...');
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}?key=${cfg.apiKey}`);
    if(r.ok){toast('✓ Conexión exitosa!');document.getElementById('gsheets-status').textContent='Estado: ✓ Conectado'}
    else{toast('Error: verificá el ID y la clave');document.getElementById('gsheets-status').textContent='Estado: Error'}
  }catch(e){toast('Error de conexión')}
}

// ========== EXCEL ==========
function exportarExcel(){
  if(typeof XLSX==='undefined'){toast('Cargando...');return}
  const wb=XLSX.utils.book_new();
  const dp=[['PRÉSTAMOS - '+(cfg.nombre||'')],['Exportado: '+new Date().toLocaleDateString('es-AR')],[]];
  dp.push(['Nombre','Tel','DNI','Dir','Capital','Interés%','Total','Cuotas','Frecuencia','Inicio','Pagadas','Pendientes','Estado','Mora','Pendiente $','Garantía','Notas']);
  prestamos.forEach(p=>{
    const est=estadoPrestamo(p);const tot=p.monto*(1+p.interes/100);
    const mora=p.cuotas.reduce((a,c)=>a+calcMora(c),0);
    const pend=p.cuotas.filter(c=>!c.pagada).reduce((a,c)=>a+c.monto+calcMora(c),0);
    dp.push([p.nombre,p.tel||'',p.dni||'',p.dir||'',p.monto,p.interes,Math.round(tot),p.cuotasTotal,p.frecuencia,fmtDate(p.fechaInicio),p.cuotas.filter(c=>c.pagada).length,p.cuotas.filter(c=>!c.pagada).length,{activo:'Al día',atrasado:'ATRASADO',pagado:'Pagado'}[est],Math.round(mora),Math.round(pend),p.garantia||'',p.notas||'']);
  });
  const ws=XLSX.utils.aoa_to_sheet(dp);XLSX.utils.book_append_sheet(wb,ws,'Préstamos');
  const dc=[['COBROS - '+(cfg.nombre||'')],['Exportado: '+new Date().toLocaleDateString('es-AR')],[]];
  dc.push(['Cliente','Cuota','De cuántas','Monto cuota','Mora','Total cobrado','Fecha']);
  pagos.forEach(pg=>dc.push([pg.cliente,pg.numCuota,pg.totalCuotas||'',Math.round(pg.montoCuota||pg.monto),Math.round(pg.mora||0),Math.round(pg.monto),fmtDate(pg.fecha)]));
  dc.push([]);dc.push(['TOTAL','','','','',pagos.reduce((a,p)=>a+p.monto,0)]);
  const ws2=XLSX.utils.aoa_to_sheet(dc);XLSX.utils.book_append_sheet(wb,ws2,'Cobros');
  const dm=[['CAJA - '+(cfg.nombre||'')],[]];
  dm.push(['Fecha','Tipo','Categoría','Descripción','Monto']);
  movimientos.forEach(m=>dm.push([fmtDate(m.fecha),m.tipo,m.categoria,m.desc,Math.round(m.monto)]));
  const ws3=XLSX.utils.aoa_to_sheet(dm);XLSX.utils.book_append_sheet(wb,ws3,'Caja');
  XLSX.writeFile(wb,'Prestamos_'+new Date().toLocaleDateString('es-AR').replace(/\//g,'-')+'.xlsx');
  toast('Excel exportado ✓');
}

function exportarExcelCobros(){
  if(typeof XLSX==='undefined'){toast('Cargando...');return}
  const wb=XLSX.utils.book_new();
  const d=[['COBROS'],[]];
  d.push(['Cliente','Cuota','Total','Monto cuota','Mora','Total cobrado','Fecha']);
  pagos.forEach(pg=>d.push([pg.cliente,pg.numCuota,pg.totalCuotas||'',Math.round(pg.montoCuota||pg.monto),Math.round(pg.mora||0),Math.round(pg.monto),fmtDate(pg.fecha)]));
  d.push([]);d.push(['TOTAL','','','','',pagos.reduce((a,p)=>a+p.monto,0)]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Cobros');
  XLSX.writeFile(wb,'Cobros_'+new Date().toLocaleDateString('es-AR').replace(/\//g,'-')+'.xlsx');

function resetearDatos(){
  if(!confirm('¿Borrar TODOS los datos? No se puede deshacer.\n\nExportá el Excel primero.'))return;
  if(!confirm('¿Confirmás que querés borrar todo?'))return;
  prestamos=[];pagos=[];movimientos=[];saveAll();renderTodo();toast('Datos borrados');
}

// ========== RENDER INICIO ==========
function renderInicio(){
  document.getElementById('fecha-hoy').textContent=HOY.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
  const activos=prestamos.filter(p=>estadoPrestamo(p)!=='pagado');
  const cap=activos.reduce((a,p)=>a+p.monto,0);
  const mora=prestamos.reduce((a,p)=>a+p.cuotas.reduce((b,c)=>b+calcMora(c),0),0);
  const pend=prestamos.reduce((a,p)=>a+p.cuotas.filter(c=>!c.pagada).reduce((b,c)=>b+c.monto+calcMora(c),0),0);
  const cob=pagos.reduce((a,p)=>a+p.monto,0);
  const at=prestamos.filter(p=>estadoPrestamo(p)==='atrasado').length;
  document.getElementById('metrics-container').innerHTML=`
    <div class="metric"><div class="label">Capital activo</div><div class="value">${fmtMoney(cap)}</div><div class="sub">${activos.length} préstamos</div></div>
    <div class="metric"><div class="label">Total cobrado</div><div class="value" style="color:var(--green)">${fmtMoney(cob)}</div><div class="sub">acumulado</div></div>
    <div class="metric"><div class="label">Por cobrar</div><div class="value">${fmtMoney(pend)}</div><div class="sub">incluye mora</div></div>
    <div class="metric"><div class="label">Mora acumulada</div><div class="value" style="color:${mora>0?'var(--red)':'var(--text)'}">${fmtMoney(mora)}</div><div class="sub">${at} atrasados</div></div>
  `;
  // Cobros: solo los vencidos (fecha < hoy) y los de hoy
  const pendientes=[];
  prestamos.forEach(p=>p.cuotas.forEach((c,i)=>{
    const f=normalizarFecha(c.fecha);
    if(!c.pagada&&f&&f<HOY)pendientes.push({p,c,i});
  }));
  // Ordenar: hoy primero, luego más atrasados
  pendientes.sort((a,b)=>normalizarFecha(b.c.fecha)-normalizarFecha(a.c.fecha));
  const totalPend=pendientes.reduce((a,x)=>a+x.c.monto+calcMora(x.c),0);
  document.getElementById('total-hoy-label').textContent=pendientes.length?`${pendientes.length} pendientes · ${fmtMoney(totalPend)}`:'';
  const ch=document.getElementById('cobros-hoy-list');
  if(!pendientes.length){ch.innerHTML='<div class="empty">✓ Sin cobros pendientes</div>';return}
  ch.innerHTML=pendientes.map(x=>{
    const f=normalizarFecha(x.c.fecha);
    const esHoy=f&&f.getTime()===HOY.getTime();
    const m=calcMora(x.c);
    return`<div class="cobro-item">
      <div class="avatar ${!esHoy?'red':''}">${getInitials(x.p.nombre)}</div>
      <div class="cobro-info">
        <div class="cobro-name">${x.p.nombre}${!esHoy?`<span class="mora-tag">${diasAtraso(x.c.fecha)}d atraso</span>`:' · hoy'}</div>
        <div class="cobro-detail">Cuota ${x.c.num}/${x.p.cuotas.length}${m>0?' · mora: '+fmtMoney(m):''}</div>
      </div>
      <span style="font-size:15px;font-weight:700;color:${m>0?'var(--red)':'var(--text)'};margin-right:10px">${fmtMoney(x.c.monto+m)}</span>
      <button class="btn sm primary" onclick="registrarPago('${x.p.id}',${x.i})">Cobrar</button>
    </div>`;
  }).join('');
  const alertas=[];
  prestamos.forEach(p=>{
    const atCuotas=p.cuotas.filter(c=>{const f=normalizarFecha(c.fecha);return!c.pagada&&f&&f<HOY});
    if(atCuotas.length){const d=diasAtraso(atCuotas[0].fecha);const m=atCuotas.reduce((a,c)=>a+calcMora(c),0);alertas.push({tipo:'red',nombre:p.nombre,msg:`${atCuotas.length} cuota(s) atrasada(s) · ${d}d · mora: ${fmtMoney(m)}`,pid:p.id})}
    const prox=p.cuotas.filter(c=>{const f=normalizarFecha(c.fecha);if(!f)return false;const diff=(f-HOY)/86400000;return!c.pagada&&diff>0&&diff<=3});
    if(prox.length){const diff=Math.round((normalizarFecha(prox[0].fecha)-HOY)/86400000);alertas.push({tipo:'amber',nombre:p.nombre,msg:`Vence en ${diff} día(s) · ${fmtDate(prox[0].fecha)}`,pid:p.id})}
  });
  const al=document.getElementById('alertas-list');
  if(!alertas.length){al.innerHTML='<div class="empty">✓ Sin alertas</div>';return}
  al.innerHTML=alertas.map(a=>`<div class="alerta-row" onclick="abrirCliente('${a.pid}')"><div class="alerta-dot ${a.tipo}"></div><div><div style="font-size:13px;font-weight:500;color:var(--text)">${a.nombre}</div><div class="hist-sub">${a.msg}</div></div></div>`).join('');
}

// ========== CLIENTES ==========
function filtroCliente(f,el){filtroClienteActual=f;document.querySelectorAll('#sec-clientes .filtro-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderClientes()}

function renderClientes(){
  const q=(document.getElementById('search-clientes').value||'').toLowerCase();
  let lista=prestamos.filter(p=>{
    if(q&&!p.nombre.toLowerCase().includes(q)&&!(p.dni||'').includes(q)&&!(p.tel||'').includes(q))return false;
    if(filtroClienteActual!=='todos'&&estadoPrestamo(p)!==filtroClienteActual)return false;
    return true;
  });
  const el=document.getElementById('lista-clientes');
  if(!lista.length){el.innerHTML='<div class="empty">No se encontraron clientes</div>';return}
  el.innerHTML=lista.map(p=>{
    const est=estadoPrestamo(p);const pct=progreso(p);
    const pend=p.cuotas.filter(c=>!c.pagada).reduce((a,c)=>a+c.monto+calcMora(c),0);
    const mora=p.cuotas.reduce((a,c)=>a+calcMora(c),0);
    const cc={activo:'green',atrasado:'red',pagado:'blue'}[est];
    const lb={activo:'Al día',atrasado:'Atrasado',pagado:'Pagado'}[est];
    return`<div class="card" onclick="abrirCliente('${p.id}')">
      <div class="card-header"><div><div class="card-name">${p.nombre}</div><div class="card-sub">${p.tel||'Sin tel'} · DNI ${p.dni||'-'}</div></div><span class="badge ${cc}">${lb}</span></div>
      ${mora>0?`<div style="font-size:11px;color:var(--red);margin-bottom:4px;font-weight:600">Mora: ${fmtMoney(mora)}</div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>${p.cuotas.filter(c=>c.pagada).length}/${p.cuotas.length} cuotas</span><span>Pendiente: ${fmtMoney(pend)}</span></div>
      <div class="progress-bar"><div class="progress-fill ${cc==='green'?'':cc}" style="width:${pct}%"></div></div>
      <div class="card-footer"><span>${fmtDate(p.fechaInicio)}</span><span>${p.frecuencia} · ${fmtMoney(p.monto)} capital</span></div>
    </div>`;
  }).join('');
}

// ========== COBROS ==========
function filtroCobro(f,el){filtroCobroActual=f;document.querySelectorAll('#sec-cobros .filtro-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCobros()}

function renderCobros(){
  const sem=new Date(HOY);sem.setDate(sem.getDate()-7);
  const mes=new Date(HOY);mes.setDate(mes.getDate()-30);
  let lista=[...pagos].reverse().filter(pg=>{
    const f=normalizarFecha(pg.fecha);if(!f)return true;
    if(filtroCobroActual==='hoy')return f.getTime()===HOY.getTime();
    if(filtroCobroActual==='semana')return f>=sem;
    if(filtroCobroActual==='mes')return f>=mes;
    return true;
  });
  const tot=lista.reduce((a,p)=>a+p.monto,0);
  const totMora=lista.reduce((a,p)=>a+(p.mora||0),0);
  document.getElementById('total-cobrado').textContent=`${fmtMoney(tot)}${totMora>0?' (mora: '+fmtMoney(totMora)+')':''}`;
  const el=document.getElementById('lista-historial');
  if(!lista.length){el.innerHTML='<div class="empty">Sin cobros registrados</div>';return}
  el.innerHTML=lista.map(pg=>`
    <div class="hist-item">
      <div class="hist-top"><span>${pg.cliente}</span><span style="color:var(--green)">${fmtMoney(pg.monto)}</span></div>
      <div class="hist-sub">Cuota ${pg.numCuota}${pg.totalCuotas?' de '+pg.totalCuotas:''} · ${fmtDate(pg.fecha)}${pg.mora>0?' · mora: '+fmtMoney(pg.mora):''}</div>
      <div style="margin-top:6px"><button class="btn sm" onclick='mostrarComprobante(${JSON.stringify(pg)})'>Ver comprobante</button></div>
    </div>
  `).join('');
}

// ========== CAJA ==========
function filtroMov(f,el){filtroMovActual=f;document.querySelectorAll('#sec-caja .filtro-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCaja()}

function renderCaja(){
  const totalCobrado=pagos.reduce((a,p)=>a+p.monto,0);
  const totalEgresos=movimientos.filter(m=>m.tipo==='egreso').reduce((a,m)=>a+m.monto,0);
  const totalIngresos=movimientos.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const ganancias=prestamos.reduce((a,p)=>a+p.cuotas.filter(c=>c.pagada).reduce((b,c)=>b+(c.moraAplicada||0),0)+p.cuotas.filter(c=>c.pagada).reduce((b,c)=>b+(c.monto - p.monto/p.cuotasTotal),0),0);
  const intereses=pagos.reduce((a,pg)=>a+(pg.mora||0),0)+prestamos.reduce((a,p)=>{
    const totalConInt=p.monto*(1+p.interes/100);
    const intPorCuota=(totalConInt-p.monto)/p.cuotasTotal;
    return a+p.cuotas.filter(c=>c.pagada).length*intPorCuota;
  },0);
  const saldoCaja=totalCobrado+totalIngresos-totalEgresos;

  document.getElementById('caja-metrics').innerHTML=`
    <div class="caja-metric green"><div class="label">Total cobrado</div><div class="value">${fmtMoney(totalCobrado)}</div><div class="sub">de préstamos</div></div>
    <div class="caja-metric purple"><div class="label">Ganancias (intereses)</div><div class="value">${fmtMoney(intereses)}</div><div class="sub">acumuladas</div></div>
    <div class="caja-metric red"><div class="label">Egresos / retiros</div><div class="value">${fmtMoney(totalEgresos)}</div><div class="sub">${movimientos.filter(m=>m.tipo==='egreso').length} movimientos</div></div>
    <div class="caja-metric"><div class="label" style="color:var(--text2)">Saldo disponible</div><div class="value" style="color:var(--text)">${fmtMoney(saldoCaja)}</div><div class="sub">cobrado - egresos</div></div>
  `;

  let lista=[...movimientos].reverse().filter(m=>{
    if(filtroMovActual==='ingreso')return m.tipo==='ingreso';
    if(filtroMovActual==='egreso')return m.tipo==='egreso';
    return true;
  });
  const el=document.getElementById('lista-movimientos');
  if(!lista.length){el.innerHTML='<div class="empty">Sin movimientos registrados.<br>Usá el botón + Registrar para anotar retiros o gastos.</div>';return}
  el.innerHTML=lista.map((m,i)=>`
    <div class="movimiento-item">
      <div class="mov-icon ${m.tipo}">${m.tipo==='ingreso'?'⬆':'⬇'}</div>
      <div class="mov-info">
        <div class="mov-desc">${m.desc||m.categoria}</div>
        <div class="mov-fecha">${fmtDate(m.fecha)} · ${m.categoria}</div>
      </div>
      <span class="mov-monto ${m.tipo}">${m.tipo==='egreso'?'-':'+'} ${fmtMoney(m.monto)}</span>
      <button class="btn sm danger" onclick="eliminarMovimiento(${movimientos.length-1-i})" style="margin-left:6px">✕</button>
    </div>
  `).join('');
}

function abrirModalMovimiento(){
  document.getElementById('mov-fecha').valueAsDate=HOY;
  document.getElementById('mov-monto').value='';
  document.getElementById('mov-desc').value='';
  document.getElementById('mov-tipo').value='egreso';
  actualizarTipoMov();
  document.getElementById('modal-movimiento').classList.add('open');
}

function actualizarTipoMov(){
  const tipo=document.getElementById('mov-tipo').value;
  const cat=document.getElementById('mov-categoria');
  if(tipo==='egreso'){
    cat.innerHTML='<option value="retiro">Retiro personal</option><option value="gasto">Gasto del negocio</option><option value="otro">Otro</option>';
  }else{
    cat.innerHTML='<option value="capital">Aporte de capital</option><option value="otro">Otro ingreso</option>';
  }
}

function guardarMovimiento(){
  const monto=parseFloat(document.getElementById('mov-monto').value);
  if(!monto||monto<=0){toast('Ingresá un monto válido');return}
  const fechaStr=document.getElementById('mov-fecha').value;
  const m={
    id:Date.now().toString(),
    tipo:document.getElementById('mov-tipo').value,
    categoria:document.getElementById('mov-categoria').value,
    desc:document.getElementById('mov-desc').value.trim(),
    monto:monto,
    fecha:parseFecha(fechaStr)||HOY
  };
  movimientos.push(m);
  saveAll();
  document.getElementById('modal-movimiento').classList.remove('open');
  renderCaja();
  toast('Movimiento guardado ✓');
}

function eliminarMovimiento(idx){
  if(!confirm('¿Eliminar este movimiento?'))return;
  movimientos.splice(idx,1);
  saveAll();renderCaja();toast('Eliminado');
}

// ========== MODAL CLIENTE ==========
function abrirCliente(id){
  clienteActualId=id;
  const p=prestamos.find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-nombre').textContent=p.nombre;
  modalTabActual='detalle';
  document.querySelectorAll('.modal-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderModalContent();
  document.getElementById('modal-cliente').classList.add('open');
}

function modalTab(tab,el){
  modalTabActual=tab;
  document.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderModalContent();
}

function renderModalContent(){
  const p=prestamos.find(x=>x.id===clienteActualId);if(!p)return;
  const total=p.monto*(1+p.interes/100);
  const cob=p.cuotas.filter(c=>c.pagada).reduce((a,c)=>a+c.monto+(c.moraAplicada||0),0);
  const pend=p.cuotas.filter(c=>!c.pagada).reduce((a,c)=>a+c.monto+calcMora(c),0);
  const mora=p.cuotas.reduce((a,c)=>a+calcMora(c),0);
  const at=p.cuotas.filter(c=>{const f=normalizarFecha(c.fecha);return!c.pagada&&f&&f<HOY}).length;
  if(modalTabActual==='detalle'){
    document.getElementById('modal-content').innerHTML=`
      <div class="metrics" style="margin-bottom:14px">
        <div class="metric"><div class="label">Capital</div><div class="value" style="font-size:18px">${fmtMoney(p.monto)}</div></div>
        <div class="metric"><div class="label">Total a cobrar</div><div class="value" style="font-size:18px">${fmtMoney(total)}</div></div>
        <div class="metric"><div class="label">Cobrado</div><div class="value" style="font-size:18px;color:var(--green)">${fmtMoney(cob)}</div></div>
        <div class="metric"><div class="label">Pendiente</div><div class="value" style="font-size:18px;color:${mora>0?'var(--red)':'var(--text)'}">${fmtMoney(pend)}</div></div>
        ${mora>0?`<div class="metric" style="grid-column:1/-1;border-color:var(--red)"><div class="label" style="color:var(--red)">Mora acumulada</div><div class="value" style="font-size:18px;color:var(--red)">${fmtMoney(mora)}</div><div class="sub">${at} cuota(s) atrasada(s)</div></div>`:''}
      </div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:12px">
        ${p.tel?'📱 '+p.tel+'<br>':''}${p.dni?'🪪 DNI: '+p.dni+'<br>':''}${p.dir?'📍 '+p.dir+'<br>':''}${p.garantia?'🔒 Garantía: '+p.garantia+'<br>':''}${p.notas?'📝 '+p.notas:''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${p.tel?`<button class="btn sm whatsapp" onclick="window.open('https://wa.me/54${(p.tel||'').replace(/\D/g,'')}')">WhatsApp</button>`:''}
        <button class="btn sm danger" onclick="eliminarPrestamo('${p.id}')">Eliminar</button>
      </div>
    `;
  }else{
    document.getElementById('modal-content').innerHTML=`
      <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        ${p.cuotas.map((c,i)=>{
          const f=normalizarFecha(c.fecha);
          const at=!c.pagada&&f&&f<HOY;
          const hm=f&&f.getTime()===HOY.getTime();
          const m=calcMora(c);
          return`<div class="cuota-row" style="${at?'background:rgba(163,45,45,0.05)':''}">
            <span class="cuota-num">${i+1}</span>
            <div class="cuota-info">
              <span>${fmtDate(c.fecha)}${hm?' · hoy':at?' · vencida':''}</span>
              ${m>0?`<small>+mora ${fmtMoney(m)} (${diasAtraso(c.fecha)}d)</small>`:''}
              ${c.pagada&&c.moraAplicada>0?`<small style="color:var(--text3)">mora cobrada: ${fmtMoney(c.moraAplicada)}</small>`:''}
            </div>
            <div class="cuota-monto" style="${m>0&&!c.pagada?'color:var(--red)':''}">${fmtMoney(c.monto+m)}${c.pagada?`<div style="font-size:10px;color:var(--text3);font-weight:400">${fmtDate(c.fechaPago)}</div>`:''}</div>
            <div class="cuota-accion">${c.pagada?'<span class="badge green">✓</span>':at||hm?`<button class="btn sm ${at?'danger':'primary'}" onclick="registrarPago('${p.id}',${i})">Cobrar</button>`:'<span class="badge gray">Pend</span>'}</div>
          </div>`;
        }).join('')}
      </div>
    `;
  }
}

function eliminarPrestamo(id){
  if(!confirm('¿Eliminar este préstamo? No se puede deshacer.'))return;
  prestamos=prestamos.filter(x=>x.id!==id);
  saveAll();cerrarModal();renderTodo();toast('Préstamo eliminado');
}

function cerrarModal(){document.getElementById('modal-cliente').classList.remove('open');clienteActualId=null}
document.getElementById('modal-cliente').onclick=function(e){if(e.target===this)cerrarModal()}
document.getElementById('modal-comprobante').onclick=function(e){if(e.target===this)this.classList.remove('open')}
document.getElementById('modal-movimiento').onclick=function(e){if(e.target===this)this.classList.remove('open')}

function registrarPago(pid,idx){
  const p=prestamos.find(x=>x.id===pid);if(!p)return;
  const c=p.cuotas[idx];if(c.pagada)return;
  const mora=calcMora(c);
  c.pagada=true;c.fechaPago=new Date(HOY);c.moraAplicada=mora;
  const pg={id:Date.now().toString(),cliente:p.nombre,clienteTel:p.tel||'',prestamoId:pid,numCuota:idx+1,totalCuotas:p.cuotas.length,monto:c.monto+mora,montoCuota:c.monto,mora:mora,fecha:new Date(HOY),frecuencia:p.frecuencia};
  pagos.push(pg);
  saveAll();
  if(clienteActualId)renderModalContent();
  renderTodo();
  mostrarComprobante(pg);
}

function mostrarComprobante(pg){
  comprobanteData=pg;
  const n=cfg.nombre||'Prestamista';const c=cfg.ciudad||'';const m=cfg.mensaje||'';
  const txt=`╔══════════════════════════╗
  COMPROBANTE DE PAGO
  ${n}${c?'\n  '+c:''}
╚══════════════════════════╝

Fecha:         ${fmtDate(pg.fecha)}
Cliente:       ${pg.cliente}
${pg.clienteTel?'Teléfono:      '+pg.clienteTel+'\n':''}
Cuota N°:      ${pg.numCuota} de ${pg.totalCuotas||''}
Monto cuota:   ${fmtMoney(pg.montoCuota||pg.monto)}
${pg.mora>0?'Mora aplicada:  '+fmtMoney(pg.mora)+'\n':''}TOTAL COBRADO:  ${fmtMoney(pg.monto)}

Estado: ✓ PAGADO
${m?'\n'+m:''}`;
  document.getElementById('comprobante-content').innerHTML=`<div class="comprobante-box">${txt.replace(/</g,'&lt;')}</div>`;
  document.getElementById('copy-ok').style.display='none';
  document.getElementById('modal-comprobante').classList.add('open');
}

function copiarComprobante(){
  navigator.clipboard.writeText(document.querySelector('.comprobante-box').textContent)
    .then(()=>{document.getElementById('copy-ok').style.display='block';setTimeout(()=>document.getElementById('copy-ok').style.display='none',2500)})
    .catch(()=>toast('Seleccioná el texto y copialo manualmente'));
}

function enviarWhatsApp(){
  if(!comprobanteData)return;
  const tel=(comprobanteData.clienteTel||'').replace(/\D/g,'');
  window.open(`https://wa.me/${tel?'54'+tel:''}?text=${encodeURIComponent(document.querySelector('.comprobante-box').textContent)}`,'_blank');
}

// ========== NUEVO PRÉSTAMO ==========
function calcularPrevia(){
  const m=parseFloat(document.getElementById('n-monto').value);
  const it=parseFloat(document.getElementById('n-interes').value);
  const cu=parseInt(document.getElementById('n-cuotas').value);
  const fr=document.getElementById('n-frecuencia').value;
  const fe=document.getElementById('n-fecha').value;
  const prev=document.getElementById('previa-prestamo');
  if(!m||isNaN(it)||!cu||!fe){prev.style.display='none';return}
  const tot=m*(1+it/100);const val=tot/cu;
  const fin=addDias(parseFecha(fe),diasFrec(fr)*(cu-1));
  document.getElementById('previa-content').innerHTML=`
    <div class="resumen-row"><span style="color:var(--text2)">Capital prestado</span><span>${fmtMoney(m)}</span></div>
    <div class="resumen-row"><span style="color:var(--text2)">Interés (${it}%)</span><span style="color:var(--amber)">${fmtMoney(m*it/100)}</span></div>
    <div class="resumen-row"><span style="color:var(--text2)">Total a cobrar</span><span>${fmtMoney(tot)}</span></div>
    <div class="resumen-row"><span style="color:var(--text2)">Valor cuota (${fr})</span><span style="font-weight:700">${fmtMoney(val)}</span></div>
    <div class="resumen-row"><span style="color:var(--text2)">Finaliza</span><span>${fmtDate(fin)}</span></div>
  `;
  prev.style.display='block';
}

function guardarPrestamo(){
  const nombre=document.getElementById('n-nombre').value.trim();
  const monto=parseFloat(document.getElementById('n-monto').value);
  const interes=parseFloat(document.getElementById('n-interes').value);
  const cuotasTotal=parseInt(document.getElementById('n-cuotas').value);
  const fechaStr=document.getElementById('n-fecha').value;
  if(!nombre||!monto||isNaN(interes)||!cuotasTotal||!fechaStr){toast('Completá: nombre, monto, interés, cuotas y fecha');return}
  const fechaInicio=parseFecha(fechaStr);
  const p={
    id:Date.now().toString()+Math.random().toString(36).slice(2),
    nombre,
    tel:document.getElementById('n-tel').value.trim(),
    dni:document.getElementById('n-dni').value.trim(),
    dir:document.getElementById('n-dir').value.trim(),
    monto,interes,cuotasTotal,
    frecuencia:document.getElementById('n-frecuencia').value,
    fechaInicio,
    garantia:document.getElementById('n-garantia').value.trim(),
    notas:document.getElementById('n-notas').value.trim(),
    cuotas:[]
  };
  p.cuotas=generarCuotas(p);
  prestamos.push(p);saveAll();limpiarForm();showTab('clientes');renderTodo();
  toast(`Préstamo de ${nombre} guardado ✓`);
}

function limpiarForm(){
  ['n-nombre','n-tel','n-dni','n-dir','n-garantia','n-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-monto').value='';
  document.getElementById('n-interes').value='30';
  document.getElementById('n-cuotas').value='10';
  document.getElementById('n-frecuencia').value='semanal';
  document.getElementById('n-fecha').value=HOY.toISOString().slice(0,10);
  document.getElementById('previa-prestamo').style.display='none';
}

function showTab(t){
  const ids=['inicio','clientes','cobros','caja','nuevo','config'];
  ids.forEach(id=>{document.getElementById('sec-'+id).classList.toggle('active',id===t)});
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',ids[i]===t));
  if(t==='cobros')renderCobros();
  if(t==='clientes')renderClientes();
  if(t==='config')loadConfig();
  if(t==='caja')renderCaja();
}

function renderTodo(){renderInicio();renderClientes();renderCobros();renderCaja()}

// Setear fecha de hoy correctamente sin bug de zona horaria
document.getElementById('n-fecha').value=HOY.toISOString().slice(0,10);
loadConfig();

renderTodo();
</script>
